<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>가계부 업데이트 중...</title>
    <script>
        // v1.406: 파일(file://) 모드 호환성 강화 및 강제 리다이렉트
        (async function() {
            console.log("🚀 가계부 진입 시도...");
            
            // 안전 장치: 3초 뒤에도 안 넘어가면 강제 이동
            const forceRedirect = setTimeout(() => {
                window.location.href = "app.html?v=1.406";
            }, 3000);

            try {
                // 1. 모든 서비스 워커 등록 해제 (에러 무시)
                if ('serviceWorker' in navigator) {
                    const regs = await navigator.serviceWorker.getRegistrations().catch(() => []);
                    for(let reg of regs) {
                        await reg.unregister().catch(() => {});
                    }
                }
                
                // 2. 모든 캐시 스토리지 삭제 (에러 무시)
                if ('caches' in window) {
                    const names = await caches.keys().catch(() => []);
                    for(let name of names) {
                        await caches.delete(name).catch(() => {});
                    }
                }

                // 3. 로컬 스토리지 데이터 유지 및 초기화
                const settings = localStorage.getItem('ledger_app-settings');
                const accounts = localStorage.getItem('ledger_accounts');
                const budgets = localStorage.getItem('ledger_budgets');
                
                localStorage.clear();
                
                if(settings) localStorage.setItem('ledger_app-settings', settings);
                if(accounts) localStorage.setItem('ledger_accounts', accounts);
                if(budgets) localStorage.setItem('ledger_budgets', budgets);

                localStorage.setItem('app-ver', '1.406');
            } catch (e) {
                console.warn("초기화 과정 중 오류 발생(무시됨):", e.message);
            }

            // 4. 새로운 진입점으로 강제 이동
            clearTimeout(forceRedirect);
            window.location.href = "app.html?v=1.406&t=" + Date.now();
        })();
    </script>
</head>
<body style="background:#0f0f14; color:#fff; font-family:sans-serif; display:flex; align-items:center; justify-content:center; height:100vh; margin:0;">
    <div style="text-align:center;">
        <div style="width:40px; height:40px; border:4px solid #7c6af7; border-top-color:transparent; border-radius:50%; animation: spin 1s linear infinite; margin:0 auto 20px;"></div>
        <p>최신 버전으로 업데이트 중입니다...</p>
        <p style="font-size:12px; color:#666;">버튼이 작동하지 않던 문제를 해결하고 있습니다.</p>
    </div>
    <style>@keyframes spin { to { transform: rotate(360deg); } }</style>
</body>
</html>
